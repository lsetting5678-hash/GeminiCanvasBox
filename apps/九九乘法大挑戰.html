<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="category" content="數學">
    <meta name="description" content="九九乘法宇宙大挑戰，支援單人練習、闖關冒險與雙人 PK 模式，搭配多巴胺特效與語音回饋。">
    <meta name="icon" content="🚀">
    <meta name="tags" content="九九乘法,數學,遊戲,特教">
    <title>九九乘法大挑戰</title>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Fix for lucide-react UMD global dependency -->
    <script>window.react = window.React;</script>
    
    <!-- Lucide Icons React -->
    <script src="https://unpkg.com/lucide-react@0.292.0/dist/umd/lucide-react.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0f172a] min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;
        const { Star, Trophy, Volume2, VolumeX, Settings, Play, Users, User, ArrowLeft, RefreshCcw, Map: MapIcon, Award, Music, Music4, ListOrdered, Timer, Hash } = window.LucideReact || {};

        // --- 星空背景組件 (Canvas) ---
        const StarryBackground = () => {
          const canvasRef = useRef(null);

          useEffect(() => {
            const canvas = canvasRef.current;
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            let animationFrameId;
            let stars = [];
            let width = window.innerWidth;
            let height = window.innerHeight;

            const initStars = () => {
              width = window.innerWidth;
              height = window.innerHeight;
              canvas.width = width;
              canvas.height = height;
              stars = [];
              const numStars = Math.floor((width * height) / 1000); 
              for (let i = 0; i < numStars; i++) {
                stars.push({
                  x: Math.random() * width,
                  y: Math.random() * height,
                  radius: Math.random() * 1.5,
                  alpha: Math.random(),
                  speed: Math.random() * 0.05,
                  twinkleSpeed: Math.random() * 0.02
                });
              }
            };

            const draw = () => {
              ctx.clearRect(0, 0, width, height);
              const gradient = ctx.createLinearGradient(0, 0, 0, height);
              gradient.addColorStop(0, '#0f172a'); 
              gradient.addColorStop(1, '#1e1b4b'); 
              ctx.fillStyle = gradient;
              ctx.fillRect(0, 0, width, height);

              ctx.fillStyle = 'white';
              stars.forEach(star => {
                ctx.globalAlpha = Math.abs(Math.sin(Date.now() * star.twinkleSpeed + star.x)) * star.alpha;
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
                ctx.fill();
                
                star.y -= star.speed;
                if (star.y < 0) star.y = height;
              });
              animationFrameId = requestAnimationFrame(draw);
            };

            initStars();
            draw();

            const handleResize = () => initStars();
            window.addEventListener('resize', handleResize);

            return () => {
              window.removeEventListener('resize', handleResize);
              cancelAnimationFrame(animationFrameId);
            };
          }, []);

          return <canvas ref={canvasRef} className="absolute inset-0 z-0 w-full h-full pointer-events-none" />;
        };

        // --- 煙火特效組件 (Canvas) ---
        const Fireworks = ({ active, burstTrigger }) => {
          const canvasRef = useRef(null);
          const activeRef = useRef(active);
          const burstQueueRef = useRef(0);
          const prevBurstRef = useRef(burstTrigger);

          // 同步 active 狀態 (避免重置 Canvas)
          useEffect(() => {
            activeRef.current = active;
          }, [active]);

          // 監聽答對瞬間的觸發，加入待發射佇列
          useEffect(() => {
            if (burstTrigger > prevBurstRef.current) {
                burstQueueRef.current += 5; // 每次答對瞬間發射5發煙火
            }
            prevBurstRef.current = burstTrigger;
          }, [burstTrigger]);

          useEffect(() => {
            const canvas = canvasRef.current;
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            let width = window.innerWidth;
            let height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;

            const fireworks = [];
            const particles = [];
            // 搭配多巴胺風格的高明度霓虹色彩
            const colors = ['#fbbf24', '#f472b6', '#34d399', '#60a5fa', '#a78bfa', '#fcd34d', '#38bdf8', '#fb7185'];

            let animationId;

            const createParticles = (x, y, color) => {
              let particleCount = 80; // 每發煙火爆炸的粒子數
              while (particleCount--) {
                particles.push({
                  x: x,
                  y: y,
                  vx: (Math.random() - 0.5) * (Math.random() * 15 + 5),
                  vy: (Math.random() - 0.5) * (Math.random() * 15 + 5),
                  alpha: 1,
                  color: color,
                  decay: Math.random() * 0.015 + 0.005,
                  size: Math.random() * 3 + 1
                });
              }
            };

            const launchFirework = () => {
                const startX = Math.random() * width;
                fireworks.push({
                  x: startX,
                  y: height,
                  targetX: startX + (Math.random() - 0.5) * 200,
                  targetY: Math.random() * (height / 2),
                  speed: Math.random() * 5 + 10,
                  angle: 0,
                  color: colors[Math.floor(Math.random() * colors.length)]
                });
                const f = fireworks[fireworks.length - 1];
                f.angle = Math.atan2(f.targetY - f.y, f.targetX - f.x);
                f.vx = Math.cos(f.angle) * f.speed;
                f.vy = Math.sin(f.angle) * f.speed;
            };

            const loop = () => {
              if (!activeRef.current && fireworks.length === 0 && particles.length === 0 && burstQueueRef.current === 0) {
                  // 畫面完全閒置時清空畫布，避免殘影與多餘效能消耗
                  ctx.clearRect(0, 0, width, height);
              } else {
                  // 利用 globalCompositeOperation 創造漸隱的殘影拖尾效果
                  ctx.globalCompositeOperation = 'destination-out';
                  ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
                  ctx.fillRect(0, 0, width, height);
                  ctx.globalCompositeOperation = 'lighter';

                  // 處理瞬間爆發的煙火 (答對時觸發)
                  while (burstQueueRef.current > 0) {
                      launchFirework();
                      burstQueueRef.current--;
                  }

                  // 隨機發射新的煙火 (機率控制煙火密集度，過關時持續發射)
                  if (activeRef.current && Math.random() < 0.08) {
                      launchFirework();
                  }

                  // 更新與繪製升空的煙火本體
                  for (let i = fireworks.length - 1; i >= 0; i--) {
                    const f = fireworks[i];
                    f.x += f.vx;
                    f.y += f.vy;

                    ctx.beginPath();
                    ctx.arc(f.x, f.y, 3, 0, Math.PI * 2);
                    ctx.fillStyle = f.color;
                    ctx.fill();

                    // 抵達目標點或開始下墜時爆炸
                    if (f.vy >= -1 || f.y <= f.targetY) {
                      createParticles(f.x, f.y, f.color);
                      fireworks.splice(i, 1);
                    }
                  }

                  // 更新與繪製爆炸散開的粒子
                  for (let i = particles.length - 1; i >= 0; i--) {
                    const p = particles[i];
                    p.vx *= 0.95; // 摩擦力減速
                    p.vy *= 0.95;
                    p.vy += 0.15; // 重力下墜
                    p.x += p.vx;
                    p.y += p.vy;
                    p.alpha -= p.decay; // 逐漸透明

                    if (p.alpha <= 0) {
                      particles.splice(i, 1);
                      continue;
                    }

                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fillStyle = p.color;
                    ctx.globalAlpha = p.alpha;
                    ctx.fill();
                    ctx.globalAlpha = 1;
                  }
              }
              animationId = requestAnimationFrame(loop);
            };
            loop();

            const handleResize = () => {
              width = window.innerWidth;
              height = window.innerHeight;
              canvas.width = width;
              canvas.height = height;
            };
            window.addEventListener('resize', handleResize);

            return () => {
              cancelAnimationFrame(animationId);
              window.removeEventListener('resize', handleResize);
            };
          }, []);

          return <canvas ref={canvasRef} className="fixed inset-0 z-30 pointer-events-none" />;
        };

        // --- 音效系統 (SFX) ---
        const PRAISE_WORDS = [
          "太神了！", "天才！", "數學大師！", "勢不可擋！", 
          "好樣的！", "快如閃電！", "完美！", "太強了！"
        ];

        const ENCOURAGE_WORDS = [
          "哎呀，再想想看喔", 
          "差一點點，再試一次", 
          "加油，再算一次看看", 
          "慢慢來，沒關係"
        ];

        const playSound = (type) => {
          const AudioContext = window.AudioContext || window.webkitAudioContext;
          if (!AudioContext) return;
          const ctx = new AudioContext();
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain);
          gain.connect(ctx.destination);

          const now = ctx.currentTime;

          if (type === 'correct') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(600, now);
            osc.frequency.exponentialRampToValueAtTime(1200, now + 0.1);
            gain.gain.setValueAtTime(0.4, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
            osc.start();
            osc.stop(now + 0.3);
          } else if (type === 'wrong') {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(200, now);
            osc.frequency.linearRampToValueAtTime(100, now + 0.2);
            gain.gain.setValueAtTime(0.3, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
            osc.start();
            osc.stop(now + 0.3);
          } else if (type === 'pop') {
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(300, now);
            gain.gain.setValueAtTime(0.1, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
            osc.start();
            osc.stop(now + 0.1);
          } else if (type === 'win') {
            osc.type = 'square';
            osc.frequency.setValueAtTime(400, now);
            osc.frequency.setValueAtTime(600, now + 0.1);
            osc.frequency.setValueAtTime(800, now + 0.2);
            gain.gain.setValueAtTime(0.2, now);
            gain.gain.linearRampToValueAtTime(0, now + 0.6);
            osc.start();
            osc.stop(now + 0.6);
          }
        };

        const speakPraise = () => {
          if (!window.speechSynthesis) return;
          window.speechSynthesis.cancel(); // 避免連續點擊時語音重疊
          const text = PRAISE_WORDS[Math.floor(Math.random() * PRAISE_WORDS.length)];
          const utterance = new SpeechSynthesisUtterance(text);
          utterance.lang = 'zh-TW';
          utterance.rate = 1.2;
          utterance.pitch = 1.2;
          window.speechSynthesis.speak(utterance);
        };

        const speakEncourage = () => {
          if (!window.speechSynthesis) return;
          window.speechSynthesis.cancel(); // 避免連續點擊時語音重疊
          const text = ENCOURAGE_WORDS[Math.floor(Math.random() * ENCOURAGE_WORDS.length)];
          const utterance = new SpeechSynthesisUtterance(text);
          utterance.lang = 'zh-TW';
          utterance.rate = 0.85; // 語速調慢，適合低年級吸收
          utterance.pitch = 1.4;  // 音調調高，聲音更溫柔親切
          window.speechSynthesis.speak(utterance);
        };

        // --- 背景音樂系統 (BGM) ---
        const useBGM = (enabled, gameState) => {
          const audioCtxRef = useRef(null);
          const isPlayingRef = useRef(false);
          const nextNoteTimeRef = useRef(0);
          const timerIDRef = useRef(null);
          const melody = [
            { note: 261.63, dur: 0.5 }, { note: 329.63, dur: 0.5 }, { note: 392.00, dur: 0.5 }, { note: 523.25, dur: 1.0 },
            { note: 392.00, dur: 0.5 }, { note: 329.63, dur: 0.5 }, { note: 261.63, dur: 1.0 },
            { note: 293.66, dur: 0.5 }, { note: 349.23, dur: 0.5 }, { note: 440.00, dur: 0.5 }, { note: 587.33, dur: 1.0 },
            { note: 440.00, dur: 0.5 }, { note: 349.23, dur: 0.5 }, { note: 293.66, dur: 1.0 }
          ];
          let currentNoteIndex = 0;

          const playNote = (ctx, freq, duration, time) => {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.type = 'sine';
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(0.05, time); 
            gain.gain.exponentialRampToValueAtTime(0.001, time + duration - 0.05);
            osc.start(time);
            osc.stop(time + duration);
          };

          const scheduler = () => {
            if (!audioCtxRef.current) return;
            while (nextNoteTimeRef.current < audioCtxRef.current.currentTime + 0.1) {
              const { note, dur } = melody[currentNoteIndex];
              playNote(audioCtxRef.current, note, dur, nextNoteTimeRef.current);
              nextNoteTimeRef.current += dur;
              currentNoteIndex = (currentNoteIndex + 1) % melody.length;
            }
            timerIDRef.current = requestAnimationFrame(scheduler);
          };

          useEffect(() => {
            if (enabled && gameState !== 'menu' && !isPlayingRef.current) {
              const AudioContext = window.AudioContext || window.webkitAudioContext;
              if (!AudioContext) return;
              audioCtxRef.current = new AudioContext();
              nextNoteTimeRef.current = audioCtxRef.current.currentTime;
              isPlayingRef.current = true;
              scheduler();
            } else if ((!enabled || gameState === 'menu') && isPlayingRef.current) {
              if (audioCtxRef.current) audioCtxRef.current.close();
              if (timerIDRef.current) cancelAnimationFrame(timerIDRef.current);
              isPlayingRef.current = false;
              audioCtxRef.current = null;
            }
            return () => {
              if (timerIDRef.current) cancelAnimationFrame(timerIDRef.current);
              if (audioCtxRef.current) audioCtxRef.current.close();
              isPlayingRef.current = false;
            };
          }, [enabled, gameState]);
        };

        // --- 遊戲資料 ---

        const LEVELS = [
          { id: 1, title: "初出茅廬", ranges: [2, 3, 4, 5], time: 60, target: 50, color: "from-green-400 to-blue-500" },
          { id: 2, title: "進階挑戰", ranges: [6, 7, 8, 9], time: 60, target: 60, color: "from-blue-400 to-indigo-500" },
          { id: 3, title: "混合試煉", ranges: [2, 3, 4, 5, 6, 7, 8, 9], time: 50, target: 80, color: "from-indigo-400 to-purple-500" },
          { id: 4, title: "極速傳說", ranges: [2, 3, 4, 5, 6, 7, 8, 9], time: 30, target: 60, color: "from-purple-400 to-pink-500" },
          { id: 5, title: "終極大師", ranges: [2, 3, 4, 5, 6, 7, 8, 9, 10], time: 45, target: 120, color: "from-pink-400 to-rose-500" },
        ];

        const generateQuestion = (selectedRanges) => {
          const ranges = selectedRanges.length > 0 ? selectedRanges : [2,3,4,5,6,7,8,9];
          const num1 = ranges[Math.floor(Math.random() * ranges.length)];
          const num2 = Math.floor(Math.random() * 9) + 2; 
          return { num1, num2, answer: num1 * num2 };
        };

        const generateOptions = (correctAnswer) => {
          const options = new Set([correctAnswer]);
          while (options.size < 4) {
            const offset = Math.floor(Math.random() * 10) - 5; 
            const val = correctAnswer + offset;
            if (val > 0 && val !== correctAnswer) options.add(val);
            else options.add(Math.floor(Math.random() * 80) + 4);
          }
          return Array.from(options).sort(() => Math.random() - 0.5);
        };

        // --- 主程式 ---

        function App() {
          const [gameState, setGameState] = useState('menu'); 
          const [mode, setMode] = useState('single'); 
          const [currentLevelId, setCurrentLevelId] = useState(1);
          const [selectedRanges, setSelectedRanges] = useState([2, 3, 4, 5, 6, 7, 8, 9]);
          
          const [freePlaySettings, setFreePlaySettings] = useState({ type: 'time', value: 60 });
          const [answeredCount, setAnsweredCount] = useState(0); 
          const [timerCount, setTimerCount] = useState(0); 

          const [score, setScore] = useState(0);
          const [p1Score, setP1Score] = useState(0);
          const [p2Score, setP2Score] = useState(0);
          const [soundEnabled, setSoundEnabled] = useState(true);
          const [musicEnabled, setMusicEnabled] = useState(false);
          const [currentQ, setCurrentQ] = useState(null);
          const [options, setOptions] = useState([]);
          const [timeLeft, setTimeLeft] = useState(60); 
          const [combo, setCombo] = useState(0);
          
          // 支援多重特效的陣列狀態
          const [feedbacks, setFeedbacks] = useState([]);
          const [particles, setParticles] = useState([]);
          
          // 新增：煙火特效控制狀態
          const [fireworksActive, setFireworksActive] = useState(false);
          const [fireworksBurst, setFireworksBurst] = useState(0);
          const fireworksTimerRef = useRef(null);

          const [leaderboard, setLeaderboard] = useState([]);
          const [trophies, setTrophies] = useState({});

          useBGM(musicEnabled, gameState); 

          useEffect(() => {
            const savedLeaderboard = JSON.parse(localStorage.getItem('math_leaderboard') || '[]');
            const savedTrophies = JSON.parse(localStorage.getItem('math_trophies') || '{}');
            setLeaderboard(savedLeaderboard);
            setTrophies(savedTrophies);
          }, []);

          useEffect(() => {
            let timer;
            if (gameState === 'playing') {
              if (mode === 'single' && freePlaySettings.type === 'count') {
                timer = setInterval(() => setTimerCount(t => t + 1), 1000);
              } else if (timeLeft > 0) {
                timer = setInterval(() => setTimeLeft((prev) => prev - 1), 1000);
              } else if (timeLeft === 0) {
                handleGameOver();
              }
            }
            return () => clearInterval(timer);
          }, [gameState, timeLeft, mode, freePlaySettings.type]);

          const handleGameOver = () => {
            if (mode === 'campaign') {
              const level = LEVELS.find(l => l.id === currentLevelId);
              if (score >= level.target) {
                playSound('win');
                let medal = 'bronze';
                if (score >= level.target * 1.5) medal = 'gold';
                else if (score >= level.target * 1.2) medal = 'silver';
                
                const newTrophies = { ...trophies, [level.id]: medal };
                if (trophies[level.id] === 'gold') newTrophies[level.id] = 'gold';
                else if (trophies[level.id] === 'silver' && medal === 'bronze') newTrophies[level.id] = 'silver';

                setTrophies(newTrophies);
                localStorage.setItem('math_trophies', JSON.stringify(newTrophies));
                setGameState('level_complete');
                return;
              }
            }
            
            if (soundEnabled) playSound('wrong');
            setGameState('gameover');

            if (mode === 'single') {
              const newEntry = { 
                score, 
                date: new Date().toLocaleDateString(),
                type: freePlaySettings.type === 'time' ? '限時' : `${freePlaySettings.value}題`
              };
              const newLeaderboard = [...leaderboard, newEntry].sort((a, b) => b.score - a.score).slice(0, 5);
              setLeaderboard(newLeaderboard);
              localStorage.setItem('math_leaderboard', JSON.stringify(newLeaderboard));
            }
          };

          const nextRound = useCallback((ranges) => {
            const q = generateQuestion(ranges || selectedRanges);
            setCurrentQ(q);
            setOptions(generateOptions(q.answer));
          }, [selectedRanges]);

          const startGame = (selectedMode, levelId = null) => {
            setMode(selectedMode);
            setScore(0);
            setP1Score(0);
            setP2Score(0);
            setCombo(0);
            setAnsweredCount(0);
            setTimerCount(0);
            setGameState('playing');
            
            if (selectedMode === 'campaign' && levelId) {
              const level = LEVELS.find(l => l.id === levelId);
              setCurrentLevelId(levelId);
              setTimeLeft(level.time);
              nextRound(level.ranges);
              if (!musicEnabled) setMusicEnabled(true);
            } else {
              if (selectedMode === 'single' && freePlaySettings.type === 'count') {
                 setTimeLeft(9999); 
              } else {
                 setTimeLeft(freePlaySettings.type === 'time' && selectedMode === 'single' ? freePlaySettings.value : 60);
              }
              nextRound(selectedRanges);
            }
            
            if (soundEnabled) playSound('pop');
          };

          // 觸發多巴胺視覺特效
          const triggerVisualEffects = (text, color, clientX, clientY, isCorrect) => {
            const id = Date.now() + Math.random();
            
            // 加入浮動文字
            setFeedbacks(prev => [...prev, { id, text, color, x: clientX, y: clientY, isCorrect }]);
            setTimeout(() => {
              setFeedbacks(prev => prev.filter(f => f.id !== id));
            }, 1000); // 動畫時間延長一點點

            // 加入星空爆破粒子 (僅答對時)
            if (isCorrect) {
              const particleColors = ['#fbbf24', '#f472b6', '#34d399', '#60a5fa', '#a78bfa', '#fcd34d'];
              const newParticles = Array.from({ length: 15 }).map((_, i) => {
                const angle = Math.random() * Math.PI * 2;
                const distance = Math.random() * 150 + 50; // 擴散距離
                return {
                  id: id + '_' + i,
                  x: clientX,
                  y: clientY,
                  tx: Math.cos(angle) * distance,
                  ty: Math.sin(angle) * distance,
                  color: particleColors[Math.floor(Math.random() * particleColors.length)],
                  size: Math.random() * 20 + 10,
                  rotation: Math.random() * 360,
                  isStar: Math.random() > 0.4 // 隨機決定是星星還是圓圈
                };
              });
              
              setParticles(prev => [...prev, ...newParticles]);
              setTimeout(() => {
                setParticles(prev => prev.filter(p => !newParticles.find(np => np.id === p.id)));
              }, 800);
            }
          };

          const handleAnswer = (val, player = 1, e) => {
            if (gameState !== 'playing') return;
            
            let clientX = window.innerWidth / 2;
            let clientY = window.innerHeight / 2;
            if (e && e.clientX) {
              clientX = e.clientX;
              clientY = e.clientY;
            }

            if (val === currentQ.answer) {
              if (soundEnabled) {
                playSound('correct');
                if (combo > 0 && (combo % 3 === 0 || Math.random() > 0.7)) speakPraise();
              }
              setCombo(c => c + 1);
              
              // 觸發答對煙火特效 (瞬間發射5發 + 延續1秒隨機發射)
              setFireworksBurst(prev => prev + 1);
              setFireworksActive(true);
              if (fireworksTimerRef.current) clearTimeout(fireworksTimerRef.current);
              fireworksTimerRef.current = setTimeout(() => {
                  setFireworksActive(false);

                       left: p.x, top: p.y,
                       width: p.size, height: p.size,
                       backgroundColor: p.color,
                       '--tx': `${p.tx}px`, '--ty': `${p.ty}px`, '--rot': `0deg`
                     }}
                   />
                 )
              ))}

              {/* 渲染浮動加分文字 */}
              {feedbacks.map(fb => (
                <div 
                  key={fb.id}
                  className="fixed pointer-events-none z-50 font-black drop-shadow-[0_0_15px_rgba(255,255,255,0.8)]"
                  style={{ 
                    left: fb.x, 
                    top: fb.y, 
                    color: fb.isCorrect ? '#fef08a' : '#ef4444', 
                    animation: fb.isCorrect 
                      ? 'feedback-correct 1s cubic-bezier(0.34, 1.56, 0.64, 1) forwards' 
                      : 'feedback-wrong 0.8s ease-out forwards'
                  }}
                >
                   <span className={`text-6xl md:text-8xl drop-shadow-2xl ${fb.color}`}>{fb.text}</span>
                </div>
              ))}

              {/* 常駐煙火畫布：由 active 與 burstTrigger 動態控制發射 */}
              <Fireworks 
                active={fireworksActive || gameState === 'level_complete' || (gameState === 'gameover' && mode === 'single' && freePlaySettings.type === 'count' && answeredCount >= freePlaySettings.value)} 
                burstTrigger={fireworksBurst} 
              />

              <div className="relative z-10 h-screen w-full flex items-center justify-center">
                {gameState === 'menu' && <MainMenu />}
                {gameState === 'campaign_select' && <CampaignSelect />}
                {gameState === 'leaderboard' && <Leaderboard />}
                {gameState === 'playing' && mode === 'single' && <SinglePlayerGame />}
                {gameState === 'playing' && mode === 'campaign' && <SinglePlayerGame />}
                {gameState === 'playing' && mode === 'multi' && <MultiPlayerGame />}
                {gameState === 'gameover' && <GameOver />}
                {gameState === 'level_complete' && <LevelComplete />}
              </div>

              <style dangerouslySetInnerHTML={{__html: `
                @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
                @keyframes pulse-slow { 0%, 100% { opacity: 0.5; transform: scale(1); } 50% { opacity: 0.8; transform: scale(1.05); } }
                @keyframes zoom-in { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
                @keyframes fade-in { 0% { opacity: 0; transform: translateY(20px); } 100% { opacity: 1; transform: translateY(0); } }
                
                /* 全新的答對浮動文字動畫：放大彈出、傾斜並向上飄 */
                @keyframes feedback-correct { 
                  0% { transform: translate(-50%, -50%) scale(0.2); opacity: 0; } 
                  20% { transform: translate(-50%, -100%) scale(1.5) rotate(5deg); opacity: 1; filter: drop-shadow(0 0 20px currentColor); } 
                  80% { transform: translate(-50%, -150%) scale(1.2) rotate(-5deg); opacity: 1; filter: drop-shadow(0 0 5px currentColor); }
                  100% { transform: translate(-50%, -200%) scale(1); opacity: 0; } 
                }

                /* 全新的答錯動畫：左右搖晃往下掉落 */
                @keyframes feedback-wrong { 
                  0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; } 
                  20% { transform: translate(-50%, -50%) scale(1.5) rotate(-15deg); opacity: 1; } 
                  40% { transform: translate(-50%, -50%) scale(1.5) rotate(15deg); opacity: 1; } 
                  60% { transform: translate(-50%, -50%) scale(1.5) rotate(-15deg); opacity: 1; } 
                  100% { transform: translate(-50%, 0%) scale(0.8); opacity: 0; } 
                }

                /* 爆破粒子特效動畫 */
                @keyframes particle-burst {
                  0% { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 1; }
                  100% { transform: translate(calc(-50% + var(--tx)), calc(-50% + var(--ty))) scale(0) rotate(var(--rot)); opacity: 0; }
                }

                .animate-float { animation: float 3s ease-in-out infinite; }
                .animate-pulse-slow { animation: pulse-slow 4s ease-in-out infinite; }
                .animate-zoom-in { animation: zoom-in 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
                .animate-fade-in { animation: fade-in 0.5s ease-out; }
                .animate-particle-burst { animation: particle-burst 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
              `}} />
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
