<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>初級加法樂園（18以內加法）</title>
  <!-- 引入 Tailwind CSS (CDN) 來維持漂亮的排版與樣式 -->
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* 點點背景與確保不被切割的基本設定 */
    html, body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      padding: 0;
      overflow-x: hidden;
      /* 允許垂直捲動以防嵌入框太矮 */
      overflow-y: auto; 
      touch-action: manipulation;
    }
    .bg-dots {
      background-image: radial-gradient(#cbd5e1 2px, transparent 2px);
      background-size: 20px 20px;
    }
    
    /* 碎紙花動畫 */
    @keyframes confetti {
      0% { transform: translateY(0) rotate(0deg) scale(1); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg) scale(0.5); opacity: 0; }
    }
    .animate-confetti { animation: confetti linear forwards; }
    
    /* 星星閃爍動畫 */
    @keyframes pulse-fast {
      0%, 100% { transform: scale(0.8); opacity: 0.2; }
      50% { transform: scale(1.5); opacity: 1; text-shadow: 0 0 10px rgba(253, 224, 71, 0.8); }
    }
    .animate-pulse-fast { animation: pulse-fast 1.5s infinite; }

    /* 進場動畫替代方案 */
    @keyframes zoomIn {
      from { opacity: 0; transform: scale(0.8); }
      to { opacity: 1; transform: scale(1); }
    }
    .animate-zoom-in { animation: zoomIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
    
    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(20px); }
      to { opacity: 1; transform: translateX(0); }
    }
    .animate-slide-in-right { animation: slideInRight 0.3s ease-out forwards; }

    /* 隱藏元素用 */
    .hidden-view { display: none !important; }
  </style>
</head>
<body class="bg-gradient-to-b from-sky-100 to-indigo-50 p-2 sm:p-4 md:p-6 font-sans text-slate-800 flex flex-col items-center select-none relative box-border">

  <!-- 全域特效容器 -->
  <div id="effects-container" class="absolute inset-0 pointer-events-none overflow-hidden z-50"></div>

  <!-- 標題與全局控制 (完美適應各尺寸) -->
  <div class="max-w-5xl xl:max-w-6xl w-full flex flex-wrap justify-between items-center mb-4 bg-white/70 backdrop-blur-sm p-2 sm:p-3 rounded-2xl shadow-sm border border-white z-10 gap-2">
    <h1 class="text-lg sm:text-xl lg:text-2xl font-black text-indigo-500 tracking-wider flex items-center gap-1 sm:gap-2">
      <span>🐰</span> 初級加法樂園
    </h1>
    <div class="flex items-center gap-2">
      <div id="score-display" class="hidden sm:flex items-center bg-indigo-100 text-indigo-700 px-2 py-1 lg:px-3 lg:py-1.5 rounded-full font-bold text-xs lg:text-sm" style="display: none;">
        🌟 分數: <span id="score-val" class="ml-1">0</span>
      </div>
      <button id="btn-voice-toggle" onclick="toggleVoice()" class="bg-green-100 text-green-700 px-3 py-1.5 rounded-full font-bold transition-colors text-xs sm:text-sm lg:text-base whitespace-nowrap">
        🔊 語音開
      </button>
    </div>
  </div>

  <!-- ================= 畫面一：設定頁面 ================= -->
  <div id="view-setup" class="max-w-lg w-full bg-white rounded-3xl shadow-xl p-4 sm:p-6 lg:p-8 border-4 border-indigo-100 text-center animate-zoom-in z-10 mt-2 sm:mt-6">
    <div class="text-5xl sm:text-6xl lg:text-7xl mb-2 sm:mb-4 animate-bounce">🦉</div>
    <h2 class="text-xl sm:text-2xl lg:text-3xl font-bold text-slate-700 mb-2 sm:mb-4">歡迎來到初級加法樂園！</h2>
    <p class="text-sm sm:text-base lg:text-lg text-slate-500 mb-4 sm:mb-6">請選擇你要挑戰的難度與題數喔！</p>
    
    <!-- 難度選擇 -->
    <div class="mb-4 sm:mb-6">
      <div class="flex flex-col sm:flex-row justify-center gap-2 sm:gap-3">
        <button onclick="setDifficulty('easy')" id="btn-diff-easy" class="flex-1 py-2 sm:py-3 px-1 sm:px-2 rounded-xl font-bold border-4 transition-all bg-green-100 text-green-700 border-green-400 scale-105 shadow-md">
          <div class="text-lg sm:text-xl mb-1">🌱 新手</div>
          <div class="text-[10px] sm:text-xs font-normal">圖示＋公式提示</div>
        </button>
        <button onclick="setDifficulty('medium')" id="btn-diff-medium" class="flex-1 py-2 sm:py-3 px-1 sm:px-2 rounded-xl font-bold border-4 transition-all bg-slate-50 text-slate-500 border-slate-200 hover:bg-amber-50">
          <div class="text-lg sm:text-xl mb-1">⭐ 進階</div>
          <div class="text-[10px] sm:text-xs font-normal">保留圖示操作</div>
        </button>
        <button onclick="setDifficulty('hard')" id="btn-diff-hard" class="flex-1 py-2 sm:py-3 px-1 sm:px-2 rounded-xl font-bold border-4 transition-all bg-slate-50 text-slate-500 border-slate-200 hover:bg-red-50">
          <div class="text-lg sm:text-xl mb-1">🔥 挑戰</div>
          <div class="text-[10px] sm:text-xs font-normal">無提示心算</div>
        </button>
      </div>
    </div>

    <!-- 題數選擇 -->
    <div class="flex justify-center gap-2 sm:gap-4 mb-6 sm:mb-8">
      <button onclick="setTotalQuestions(5)" id="btn-q-5" class="w-14 h-14 sm:w-16 sm:h-16 lg:w-20 lg:h-20 rounded-xl lg:rounded-2xl text-lg sm:text-xl lg:text-2xl font-bold border-4 transition-all bg-indigo-500 text-white border-indigo-600 scale-110 shadow-lg">5題</button>
      <button onclick="setTotalQuestions(10)" id="btn-q-10" class="w-14 h-14 sm:w-16 sm:h-16 lg:w-20 lg:h-20 rounded-xl lg:rounded-2xl text-lg sm:text-xl lg:text-2xl font-bold border-4 transition-all bg-slate-50 text-slate-500 border-slate-200 hover:bg-indigo-50">10題</button>
      <button onclick="setTotalQuestions(20)" id="btn-q-20" class="w-14 h-14 sm:w-16 sm:h-16 lg:w-20 lg:h-20 rounded-xl lg:rounded-2xl text-lg sm:text-xl lg:text-2xl font-bold border-4 transition-all bg-slate-50 text-slate-500 border-slate-200 hover:bg-indigo-50">20題</button>
    </div>

    <div class="flex flex-col gap-3 sm:gap-4">

        🚀 開始挑戰

      <button onclick="exportToWord()" class="w-full bg-gradient-to-r from-blue-400 to-indigo-400 text-white py-3 sm:py-4 rounded-xl lg:rounded-2xl font-bold text-base sm:text-lg lg:text-xl shadow-lg hover:shadow-xl hover:scale-105 transition-all active:scale-95 flex justify-center items-center gap-2">

  <!-- ================= 畫面二：遊戲中 ================= -->
  <div id="view-playing" class="max-w-5xl xl:max-w-6xl w-full flex-col items-center z-10 hidden-view h-auto">
    
    <div class="w-full flex items-center justify-between mb-2 sm:mb-4 px-1 sm:px-2">

      <!-- 動物助手提示框 -->

            <!-- JS 動態生成 -->

            <span class="text-base sm:text-xl lg:text-3xl font-bold text-slate-600 whitespace-nowrap">總共是</span>
            <div id="answer-input" class="w-16 h-12 sm:w-24 sm:h-16 lg:w-32 lg:h-20 flex items-center justify-center text-3xl sm:text-4xl lg:text-5xl font-black text-indigo-600 bg-indigo-50 border-2 sm:border-4 border-indigo-200 rounded-xl lg:rounded-2xl transition-colors shadow-inner">

            <div class="grid grid-cols-3 gap-1.5 sm:gap-2 lg:gap-3 w-full max-w-[340px] bg-white p-3 sm:p-4 lg:p-6 rounded-2xl lg:rounded-3xl border-2 sm:border-4 border-slate-200 shadow-sm mx-auto">
              <button onclick="handleKeypadPress('1')" class="bg-slate-50 hover:bg-indigo-50 active:bg-indigo-100 text-slate-700 text-xl sm:text-2xl lg:text-4xl font-black py-2 sm:py-3 lg:py-4 rounded-xl lg:rounded-2xl border-b-2 sm:border-b-4 border-slate-300 active:border-b-0 active:translate-y-1 transition-all">1</button>
              <button onclick="handleKeypadPress('2')" class="bg-slate-50 hover:bg-indigo-50 active:bg-indigo-100 text-slate-700 text-xl sm:text-2xl lg:text-4xl font-black py-2 sm:py-3 lg:py-4 rounded-xl lg:rounded-2xl border-b-2 sm:border-b-4 border-slate-300 active:border-b-0 active:translate-y-1 transition-all">2</button>
              <button onclick="handleKeypadPress('3')" class="bg-slate-50 hover:bg-indigo-50 active:bg-indigo-100 text-slate-700 text-xl sm:text-2xl lg:text-4xl font-black py-2 sm:py-3 lg:py-4 rounded-xl lg:rounded-2xl border-b-2 sm:border-b-4 border-slate-300 active:border-b-0 active:translate-y-1 transition-all">3</button>
              <button onclick="handleKeypadPress('4')" class="bg-slate-50 hover:bg-indigo-50 active:bg-indigo-100 text-slate-700 text-xl sm:text-2xl lg:text-4xl font-black py-2 sm:py-3 lg:py-4 rounded-xl lg:rounded-2xl border-b-2 sm:border-b-4 border-slate-300 active:border-b-0 active:translate-y-1 transition-all">4</button>
              <button onclick="handleKeypadPress('5')" class="bg-slate-50 hover:bg-indigo-50 active:bg-indigo-100 text-slate-700 text-xl sm:text-2xl lg:text-4xl font-black py-2 sm:py-3 lg:py-4 rounded-xl lg:rounded-2xl border-b-2 sm:border-b-4 border-slate-300 active:border-b-0 active:translate-y-1 transition-all">5</button>
              <button onclick="handleKeypadPress('6')" class="bg-slate-50 hover:bg-indigo-50 active:bg-indigo-100 text-slate-700 text-xl sm:text-2xl lg:text-4xl font-black py-2 sm:py-3 lg:py-4 rounded-xl lg:rounded-2xl border-b-2 sm:border-b-4 border-slate-300 active:border-b-0 active:translate-y-1 transition-all">6</button>
              <button onclick="handleKeypadPress('7')" class="bg-slate-50 hover:bg-indigo-50 active:bg-indigo-100 text-slate-700 text-xl sm:text-2xl lg:text-4xl font-black py-2 sm:py-3 lg:py-4 rounded-xl lg:rounded-2xl border-b-2 sm:border-b-4 border-slate-300 active:border-b-0 active:translate-y-1 transition-all">7</button>
              <button onclick="handleKeypadPress('8')" class="bg-slate-50 hover:bg-indigo-50 active:bg-indigo-100 text-slate-700 text-xl sm:text-2xl lg:text-4xl font-black py-2 sm:py-3 lg:py-4 rounded-xl lg:rounded-2xl border-b-2 sm:border-b-4 border-slate-300 active:border-b-0 active:translate-y-1 transition-all">8</button>
              <button onclick="handleKeypadPress('9')" class="bg-slate-50 hover:bg-indigo-50 active:bg-indigo-100 text-slate-700 text-xl sm:text-2xl lg:text-4xl font-black py-2 sm:py-3 lg:py-4 rounded-xl lg:rounded-2xl border-b-2 sm:border-b-4 border-slate-300 active:border-b-0 active:translate-y-1 transition-all">9</button>
              <button onclick="handleKeypadDelete()" class="bg-red-50 hover:bg-red-100 active:bg-red-200 text-red-500 text-lg sm:text-xl lg:text-3xl font-black py-2 sm:py-3 lg:py-4 rounded-xl lg:rounded-2xl border-b-2 sm:border-b-4 border-red-200 active:border-b-0 active:translate-y-1 transition-all flex items-center justify-center">⌫</button>
              <button onclick="handleKeypadPress('0')" class="bg-slate-50 hover:bg-indigo-50 active:bg-indigo-100 text-slate-700 text-xl sm:text-2xl lg:text-4xl font-black py-2 sm:py-3 lg:py-4 rounded-xl lg:rounded-2xl border-b-2 sm:border-b-4 border-slate-300 active:border-b-0 active:translate-y-1 transition-all">0</button>
              <button id="btn-submit" onclick="checkAnswer()" class="bg-green-500 hover:bg-green-600 disabled:bg-slate-300 text-white text-base sm:text-xl lg:text-2xl font-black py-2 sm:py-3 lg:py-4 rounded-xl lg:rounded-2xl border-b-2 sm:border-b-4 border-green-700 disabled:border-slate-400 active:border-b-0 active:translate-y-1 transition-all flex items-center justify-center">送出</button>
            </div>

          <!-- 單題過關區 -->
          <div id="next-q-area" class="hidden-view flex-col items-center animate-zoom-in w-full">
            <div class="flex flex-col items-center gap-1 sm:gap-2 mb-4 sm:mb-8">

              <span>下一題</span><span>👉</span>

  <!-- ================= 畫面三：結算頁面 ================= -->
  <div id="view-result" class="hidden-view w-full justify-center items-center flex-1 z-10 mt-2 sm:mt-4">
    <div id="result-card" class="max-w-lg w-full bg-white rounded-[2rem] lg:rounded-[2.5rem] shadow-xl lg:shadow-2xl p-6 sm:p-8 lg:p-10 border-4 sm:border-8 text-center animate-zoom-in relative overflow-hidden">
      <div id="result-bg" class="absolute inset-0 opacity-10 pointer-events-none"></div>
      
      <div class="relative z-10 flex flex-col items-center">

        <div id="res-emoji" class="text-6xl sm:text-8xl lg:text-9xl mb-2 sm:mb-4 drop-shadow-2xl animate-[bounce_2s_infinite]">🏆</div>
        <h2 id="res-title" class="text-3xl sm:text-4xl lg:text-5xl font-black mb-1 sm:mb-2 drop-shadow-sm">獎項名稱</h2>
        <p id="res-desc" class="text-base sm:text-xl lg:text-2xl text-slate-600 mb-4 sm:mb-8 font-bold bg-slate-100 px-4 py-1.5 lg:px-6 lg:py-2 rounded-full inline-block">評語</p>

        <div class="bg-slate-50 w-full rounded-xl lg:rounded-2xl p-3 sm:p-4 mb-4 sm:mb-8 border-2 border-slate-100 flex justify-center items-center gap-4 sm:gap-6">
          <div class="text-center">
            <div class="text-xs sm:text-sm text-slate-400 font-bold mb-1">一次答對題數</div>
            <div id="res-score" class="text-3xl sm:text-4xl font-black text-green-500">0</div>
          </div>
          <div class="text-2xl sm:text-3xl text-slate-300">/</div>
          <div class="text-center">
            <div class="text-xs sm:text-sm text-slate-400 font-bold mb-1">總題數</div>
            <div id="res-total-q2" class="text-3xl sm:text-4xl font-black text-slate-600">0</div>
          </div>
        </div>
        
        <div class="flex flex-col sm:flex-row gap-2 sm:gap-4 w-full">
          <button onclick="goToSetup()" class="flex-1 bg-indigo-500 text-white py-2 sm:py-3 lg:py-4 rounded-xl lg:rounded-2xl font-bold text-lg sm:text-xl lg:text-2xl shadow-md lg:shadow-lg hover:bg-indigo-600 hover:-translate-y-1 transition-all active:scale-95">🔄 再玩一次</button>
          <button onclick="exportToWord()" class="flex-1 bg-blue-100 text-blue-700 border-2 border-blue-300 py-2 sm:py-3 lg:py-4 rounded-xl lg:rounded-2xl font-bold text-base sm:text-lg lg:text-xl shadow-sm hover:bg-blue-200 hover:-translate-y-1 transition-all active:scale-95 flex justify-center items-center gap-2"><span>🖨️</span> 印出學習單</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ================= 遊戲主程式碼 ================= -->
  <script>
    // --- 遊戲狀態變數 ---
    let gameState = 'setup'; 
    let totalQuestions = 5;
    let difficulty = 'easy'; 
    let currentQIndex = 0;
    let questions = [];
    let score = 0;
    let hasMistakeInCurrentQ = false;
    let num1 = 0;
    let num2 = 0;
    let movedCount = 0; 
    let userAnswer = '';
    let showCelebration = false;
    let isVoiceEnabled = true;
    let audioCtx = null;

    // --- 初始化綁定與介面 ---
    function init() {
      updateSetupUI();
    }

    // --- 語音與音效 ---
    function toggleVoice() {
      isVoiceEnabled = !isVoiceEnabled;
      const btn = document.getElementById('btn-voice-toggle');
      if(isVoiceEnabled){
        btn.className = "bg-green-100 text-green-700 px-3 py-1.5 rounded-full font-bold transition-colors text-xs sm:text-sm lg:text-base whitespace-nowrap";
        btn.innerText = "🔊 語音開";
      }else{
        btn.className = "bg-slate-200 text-slate-500 px-3 py-1.5 rounded-full font-bold transition-colors text-xs sm:text-sm lg:text-base whitespace-nowrap";
        btn.innerText = "🔇 語音關";
        if(window.speechSynthesis) window.speechSynthesis.cancel();
      }
    }

    function speak(text) {
      if (!isVoiceEnabled || !window.speechSynthesis) return;
      window.speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = 'zh-TW';
      utterance.rate = 0.9;
      utterance.pitch = 1.2;
      window.speechSynthesis.speak(utterance);
    }

    function initAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function playSound(type) {
      if(!audioCtx) return;
      const now = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);

      if (type === 'pop') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(400, now);
        osc.frequency.exponentialRampToValueAtTime(800, now + 0.1);
        gain.gain.setValueAtTime(0.3, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
        osc.start(now); osc.stop(now + 0.1);
      } else if (type === 'success') {
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(523.25, now); 
        osc.frequency.setValueAtTime(659.25, now + 0.1); 
        osc.frequency.setValueAtTime(783.99, now + 0.2); 
        osc.frequency.setValueAtTime(1046.50, now + 0.3); 
        gain.gain.setValueAtTime(0, now);
        gain.gain.linearRampToValueAtTime(0.3, now + 0.1);
        gain.gain.setValueAtTime(0.3, now + 0.3);
        gain.gain.linearRampToValueAtTime(0, now + 0.5);
        osc.start(now); osc.stop(now + 0.5);
      } else if (type === 'error') {
        osc.type = 'square';
        osc.frequency.setValueAtTime(150, now);
        osc.frequency.exponentialRampToValueAtTime(100, now + 0.3);
        gain.gain.setValueAtTime(0.2, now);
        gain.gain.linearRampToValueAtTime(0, now + 0.3);
        osc.start(now); osc.stop(now + 0.3);
      } else if (type === 'victory') {
        osc.type = 'sine';
        const notes = [523.25, 659.25, 783.99, 1046.50, 1318.51, 1567.98, 2093.00];
        notes.forEach((freq, i) => { osc.frequency.setValueAtTime(freq, now + i * 0.15); });
        gain.gain.setValueAtTime(0, now);
        gain.gain.linearRampToValueAtTime(0.4, now + 0.2);
        gain.gain.setValueAtTime(0.4, now + 1.0);
        gain.gain.linearRampToValueAtTime(0, now + 1.5);
        osc.start(now); osc.stop(now + 1.5);
      }
    }

    // --- 特效控制 ---
    function showConfettiEffect() {
      const container = document.getElementById('effects-container');
      container.innerHTML = '';
      const colors = ['bg-pink-400', 'bg-yellow-400', 'bg-blue-400', 'bg-green-400', 'bg-purple-400', 'bg-orange-400'];
      for(let i=0; i<40; i++){
        const div = document.createElement('div');
        const color = colors[Math.floor(Math.random() * colors.length)];
        div.className = `absolute top-[-10%] w-2 h-2 sm:w-3 sm:h-3 rounded-sm ${color} animate-confetti`;
        div.style.left = `${Math.random() * 100}%`;
        div.style.animationDuration = `${Math.random() * 2 + 1.5}s`;
        div.style.animationDelay = `${Math.random() * 0.5}s`;
        container.appendChild(div);
      }
    }

    function showSparklesEffect() {
      const container = document.getElementById('effects-container');
      for(let i=0; i<15; i++){
        const div = document.createElement('div');
        div.innerText = '✦';
        div.className = `absolute text-yellow-300 animate-pulse-fast text-xl sm:text-2xl`;
        div.style.left = `${Math.random() * 100}%`;
        div.style.top = `${Math.random() * 100}%`;
        div.style.animationDelay = `${Math.random() * 2}s`;
        div.style.opacity = '0.7';
        container.appendChild(div);
      }
    }

    function clearEffects() {
      document.getElementById('effects-container').innerHTML = '';
    }

    // --- 介面控制與流程 ---
    function setDifficulty(level) {
      difficulty = level;
      updateSetupUI();
    }

    function setTotalQuestions(num) {
      totalQuestions = num;
      updateSetupUI();
    }

    function updateSetupUI() {
      const diffs = ['easy', 'medium', 'hard'];
      diffs.forEach(d => {
        const btn = document.getElementById(`btn-diff-${d}`);
        btn.className = `flex-1 py-2 sm:py-3 px-1 sm:px-2 rounded-xl font-bold border-4 transition-all ${d === difficulty ? 
          (d==='easy'?'bg-green-100 text-green-700 border-green-400 scale-105 shadow-md':
           d==='medium'?'bg-amber-100 text-amber-700 border-amber-400 scale-105 shadow-md':
           'bg-red-100 text-red-700 border-red-400 scale-105 shadow-md') : 
          ('bg-slate-50 text-slate-500 border-slate-200 hover:bg-'+(d==='easy'?'green':d==='medium'?'amber':'red')+'-50')}`;
      });

      [5, 10, 20].forEach(n => {
        const btn = document.getElementById(`btn-q-${n}`);
        btn.className = `w-14 h-14 sm:w-16 sm:h-16 lg:w-20 lg:h-20 rounded-xl lg:rounded-2xl text-lg sm:text-xl lg:text-2xl font-bold border-4 transition-all ${n === totalQuestions ? 'bg-indigo-500 text-white border-indigo-600 scale-110 shadow-lg' : 'bg-slate-50 text-slate-500 border-slate-200 hover:bg-indigo-50'}`;
      });
    }

    function goToSetup() {
      if(window.speechSynthesis) window.speechSynthesis.cancel();
      clearEffects();
      document.getElementById('view-setup').classList.remove('hidden-view');
      document.getElementById('view-playing').classList.add('hidden-view');
      document.getElementById('view-result').classList.add('hidden-view');
      document.getElementById('score-display').style.display = 'none';
      gameState = 'setup';
    }

    function generateQuestionsList(count) {
      const list = [];
      for (let i = 0; i < count; i++) {
        const S = Math.floor(Math.random() * 8) + 11; 
        const a = Math.floor(Math.random() * 3) + 7;  
        const b = S - a;
        if (Math.random() > 0.5) list.push({ n1: a, n2: b });
        else list.push({ n1: b, n2: a });
      }
      return list;
    }

    function startGame() {
      initAudio();
      questions = generateQuestionsList(totalQuestions);
      currentQIndex = 0;
      score = 0;
      gameState = 'playing';
      
      document.getElementById('view-setup').classList.add('hidden-view');
      document.getElementById('view-playing').classList.remove('hidden-view');
      document.getElementById('view-playing').classList.add('flex');
      document.getElementById('score-display').style.display = 'flex';
      
      loadQuestion(questions[0]);
    }

    function loadQuestion(q) {
      num1 = q.n1;
      num2 = q.n2;
      movedCount = 0;
      userAnswer = '';
      showCelebration = false;
      hasMistakeInCurrentQ = false;
      clearEffects();
      
      renderPlayingView();

      setTimeout(() => {
        if (difficulty === 'easy') speak(`第${currentQIndex + 1}題。你可以點擊蘋果往左邊或右邊搬，湊成十個喔！`);
        else if (difficulty === 'medium') speak(`第${currentQIndex + 1}題。請算算看總共是幾個？你可以自己搬蘋果來幫忙喔。`);
        else speak(`第${currentQIndex + 1}題。請直接挑戰心算，輸入答案！`);
      }, 500);
    }

    // --- 核心算繪 (十格陣與作答區) ---
    function renderPlayingView() {
      // 進度條
      document.getElementById('progress-bar').style.width = `${(currentQIndex / totalQuestions) * 100}%`;
      document.getElementById('progress-text').innerText = `第 ${currentQIndex + 1} / ${totalQuestions} 題`;
      document.getElementById('score-val').innerText = score;

      const currentLeft = num1 + movedCount;
      const currentRight = num2 - movedCount;
      const isTenMade = currentLeft === 10 || currentRight === 10;
      const currentTotal = num1 + num2;

      // 助手提示
      const bubble = document.getElementById('assistant-bubble');
      if (difficulty === 'easy') {
        bubble.innerText = !isTenMade ? "你可以自由點擊蘋果，往左邊或右邊搬，湊成 10 喔！" : !showCelebration ? "太棒了，湊成 10 啦！現在總共是幾個呢？" : "答對了！你超級厲害！🎉";
      } else if (difficulty === 'medium') {
        bubble.innerText = !showCelebration ? "算算看總共是幾個？你可以兩邊自由搬蘋果來幫忙喔！" : "答對了！你超級厲害！🎉";
      } else {
        bubble.innerText = !showCelebration ? "挑戰心算！請直接輸入答案！" : "答對了！太神啦！🎉";
      }

      if (difficulty === 'easy' && isTenMade && !showCelebration && userAnswer === '') {
        speak("哇！湊成十了！現在算算看，總共是幾個呢？");
      }

      // 十格陣
      const framesContainer = document.getElementById('frames-container');
      if (difficulty !== 'hard') {
        let leftGrid = '', rightGrid = '';
        for(let i=0; i<10; i++){
          // Left Grid (縮小尺寸以防擠壓)
          const isLeftVis = i < currentLeft;
          const leftContent = isLeftVis ? (i < num1 + Math.min(0, movedCount) ? '🍎' : '🍏') : '';
          const leftCanClick = isLeftVis && currentRight < 10 && !isTenMade && difficulty !== 'hard' && !showCelebration;
          leftGrid += `<div onclick="${leftCanClick ? 'handleMoveLeftToRight()' : ''}" class="w-8 h-8 sm:w-10 sm:h-10 lg:w-12 lg:h-12 xl:w-14 xl:h-14 bg-white rounded-lg sm:rounded-xl border-2 flex items-center justify-center text-xl sm:text-2xl lg:text-3xl xl:text-4xl relative overflow-hidden transition-all ${leftCanClick ? 'cursor-pointer hover:bg-amber-100 hover:scale-105 active:scale-90 shadow-md border-amber-300' : 'border-amber-100 shadow-sm'}">${isLeftVis ? `<span class="animate-zoom-in drop-shadow-md">${leftContent}</span>` : `<span class="w-1.5 h-1.5 sm:w-2 sm:h-2 rounded-full bg-amber-200/50"></span>`}</div>`;

          // Right Grid
          const isRightVis = i < currentRight;
          const rightContent = isRightVis ? (i < num2 - Math.max(0, movedCount) ? '🍏' : '🍎') : '';
          const rightCanClick = isRightVis && currentLeft < 10 && !isTenMade && difficulty !== 'hard' && !showCelebration;
          rightGrid += `<div onclick="${rightCanClick ? 'handleMoveRightToLeft()' : ''}" class="w-8 h-8 sm:w-10 sm:h-10 lg:w-12 lg:h-12 xl:w-14 xl:h-14 bg-white rounded-lg sm:rounded-xl border-2 flex items-center justify-center text-xl sm:text-2xl lg:text-3xl xl:text-4xl relative overflow-hidden transition-all ${rightCanClick ? 'cursor-pointer hover:bg-sky-100 hover:scale-105 active:scale-90 shadow-md border-sky-300' : 'border-sky-100 shadow-sm'}">${isRightVis ? `<span class="animate-zoom-in drop-shadow-md">${rightContent}</span>` : `<span class="w-1.5 h-1.5 sm:w-2 sm:h-2 rounded-full bg-sky-200/50"></span>`}</div>`;
        }

        framesContainer.innerHTML = `
          <div class="flex flex-col md:flex-row gap-3 sm:gap-6 lg:gap-10 items-center justify-center w-full">
            <div class="relative bg-amber-50/80 backdrop-blur p-2 sm:p-3 lg:p-4 rounded-2xl lg:rounded-3xl border-2 sm:border-4 transition-all duration-500 ${isTenMade && currentLeft===10 ? 'border-green-400 bg-green-50 shadow-green-200 shadow-md lg:shadow-lg sm:scale-105' : 'border-amber-200'}">
              <div class="grid grid-cols-5 gap-1 sm:gap-1.5 lg:gap-2 w-max mx-auto">${leftGrid}</div>
              ${isTenMade && currentLeft===10 ? `<div class="absolute -top-3 -right-3 sm:-top-4 sm:-right-4 lg:-top-6 lg:-right-6 bg-red-500 text-white w-8 h-8 sm:w-10 sm:h-10 lg:w-14 lg:h-14 xl:w-16 xl:h-16 rounded-full flex items-center justify-center font-black text-sm sm:text-lg lg:text-2xl shadow-lg border-2 sm:border-4 border-white transform rotate-12 animate-zoom-in z-20">10!</div>` : ''}
            </div>
            
            <div class="flex flex-col items-center justify-center relative h-10 w-10 sm:h-12 sm:w-12 lg:h-16 lg:w-16 shrink-0">
              <div class="text-3xl sm:text-4xl lg:text-6xl font-black text-slate-200 absolute">+</div>
              ${movedCount !== 0 && !showCelebration ? `<button onclick="handleResetMove()" class="absolute top-8 sm:top-10 lg:top-14 whitespace-nowrap bg-slate-700 hover:bg-slate-800 text-white px-2 py-1 lg:px-3 lg:py-1.5 rounded-full font-bold shadow-md lg:shadow-lg transition-transform active:scale-95 text-[10px] sm:text-xs lg:text-sm z-20">↩️ 復原</button>` : ''}
            </div>

            <div class="relative bg-sky-50/80 backdrop-blur p-2 sm:p-3 lg:p-4 rounded-2xl lg:rounded-3xl border-2 sm:border-4 transition-all duration-500 ${isTenMade && currentRight===10 ? 'border-green-400 bg-green-50 shadow-green-200 shadow-md lg:shadow-lg sm:scale-105' : 'border-sky-200'}">
              <div class="grid grid-cols-5 gap-1 sm:gap-1.5 lg:gap-2 w-max mx-auto">${rightGrid}</div>
              ${isTenMade && currentRight===10 ? `<div class="absolute -top-3 -right-3 sm:-top-4 sm:-right-4 lg:-top-6 lg:-right-6 bg-red-500 text-white w-8 h-8 sm:w-10 sm:h-10 lg:w-14 lg:h-14 xl:w-16 xl:h-16 rounded-full flex items-center justify-center font-black text-sm sm:text-lg lg:text-2xl shadow-lg border-2 sm:border-4 border-white transform rotate-12 animate-zoom-in z-20">10!</div>` : ''}
            </div>
          </div>
        `;
      } else {
        framesContainer.innerHTML = `<div class="flex justify-center items-center py-6 sm:py-10"><div class="text-7xl sm:text-9xl opacity-20 filter grayscale">🧠</div></div>`;
      }

      // 算式展示
      let eqHTML = `<span class="text-amber-500">${num1}</span><span>+</span><span class="text-sky-500">${num2}</span><span>=</span>`;
      if (!isTenMade && difficulty === 'easy') {
        eqHTML += `<span class="text-slate-300">?</span>`;
      } else if (difficulty === 'easy') {
        eqHTML += `<span class="text-green-500 flex items-center gap-1 sm:gap-2 animate-fade-in"><span class="text-lg sm:text-2xl lg:text-3xl text-slate-400">(${currentLeft === 10 ? 10 : currentLeft} + ${currentRight === 10 ? 10 : currentRight})</span></span>`;
      } else {
        eqHTML += `<span class="text-slate-300">?</span>`;
      }
      document.getElementById('equation-display').innerHTML = eqHTML;

      // 鍵盤與作答區邏輯
      const ansInputContainer = document.getElementById('answer-input-container');
      const rightPanel = document.getElementById('right-panel');
      const keypadArea = document.getElementById('keypad-area');
      const nextQArea = document.getElementById('next-q-area');
      const ansInput = document.getElementById('answer-input');

      if ((difficulty !== 'easy' || isTenMade)) {
        ansInputContainer.classList.remove('opacity-0', 'translate-y-4', 'pointer-events-none');
        ansInputContainer.classList.add('opacity-100', 'translate-y-0');

        rightPanel.classList.remove('opacity-0', 'translate-y-4', 'pointer-events-none');
        rightPanel.classList.add('opacity-100', 'lg:translate-y-0', 'translate-y-0');
      } else {
        ansInputContainer.classList.add('opacity-0', 'translate-y-4', 'pointer-events-none');
        ansInputContainer.classList.remove('opacity-100', 'translate-y-0');

        rightPanel.classList.add('opacity-0', 'translate-y-4', 'pointer-events-none');
        rightPanel.classList.remove('opacity-100', 'lg:translate-y-0', 'translate-y-0');
      }

      if (!showCelebration) {
        keypadArea.style.display = 'flex';
        nextQArea.style.display = 'none';
        ansInput.innerHTML = userAnswer ? userAnswer : `<span class="text-indigo-200">?</span>`;
        document.getElementById('btn-submit').disabled = !userAnswer;
      } else {
        keypadArea.style.display = 'none';
        nextQArea.style.display = 'flex';
        document.getElementById('correct-answer-display').innerText = currentTotal;
        const plusOne = document.getElementById('score-plus-one');
        if(!hasMistakeInCurrentQ){
          plusOne.classList.remove('hidden-view');
        } else {
          plusOne.classList.add('hidden-view');
        }
      }
    }

    // --- 操作與驗證邏輯 ---
    function handleMoveLeftToRight() {
      const currentLeft = num1 + movedCount;
      const currentRight = num2 - movedCount;
      if (currentLeft > 0 && currentRight < 10 && !showCelebration) {
        playSound('pop');
        movedCount -= 1;
        renderPlayingView();
      }
    }

    function handleMoveRightToLeft() {
      const currentLeft = num1 + movedCount;
      const currentRight = num2 - movedCount;
      if (currentRight > 0 && currentLeft < 10 && !showCelebration) {
        playSound('pop');
        movedCount += 1;
        renderPlayingView();
      }
    }

    function handleResetMove() {
      if (movedCount !== 0 && !showCelebration) {
        playSound('pop');
        movedCount = 0;
        renderPlayingView();
      }
    }

    function handleKeypadPress(numStr) {
      if(userAnswer.length >= 2) return;
      if(userAnswer === '0') userAnswer = numStr;
      else userAnswer += numStr;
      renderPlayingView();
    }

    function handleKeypadDelete() {
      userAnswer = userAnswer.slice(0, -1);
      renderPlayingView();
    }

    function checkAnswer() {
      const currentTotal = num1 + num2;
      if (parseInt(userAnswer) === currentTotal) {
        showCelebration = true;
        playSound('success');
        speak("答對了！你太厲害啦！");
        if (!hasMistakeInCurrentQ) {
          score += 1;
        }
        showConfettiEffect();
        renderPlayingView();
      } else {
        playSound('error');
        speak("哎呀，再算一次看看喔！");
        hasMistakeInCurrentQ = true;
        
        const inputEl = document.getElementById('answer-input');
        inputEl.classList.remove('border-indigo-200', 'bg-indigo-50', 'text-indigo-600');
        inputEl.classList.add('animate-bounce', 'border-red-500', 'bg-red-50', 'text-red-500');
        setTimeout(() => {
          inputEl.classList.remove('animate-bounce', 'border-red-500', 'bg-red-50', 'text-red-500');
          inputEl.classList.add('border-indigo-200', 'bg-indigo-50', 'text-indigo-600');
          userAnswer = '';
          renderPlayingView();
        }, 800);
      }
    }

    function nextQuestion() {
      if (currentQIndex + 1 < questions.length) {
        currentQIndex += 1;
        loadQuestion(questions[currentQIndex]);
      } else {
        finishGame();
      }
    }

    // --- 結算畫面 ---
    function finishGame() {
      gameState = 'result';
      playSound('victory');
      
      document.getElementById('view-playing').classList.add('hidden-view');
      document.getElementById('view-playing').classList.remove('flex');
      document.getElementById('view-result').classList.remove('hidden-view');
      document.getElementById('view-result').classList.add('flex');
      
      const accuracy = score / totalQuestions;
      
      let emoji, title, color, bg, border, desc;
      if (accuracy === 1) {
        emoji='🏆'; title='閃耀大金盃'; color='text-yellow-500'; bg='from-yellow-300 to-amber-500'; border='border-yellow-400'; desc='完美！全部一次答對！';
        showSparklesEffect();
      } else if (accuracy >= 0.8) {
        emoji='🥇'; title='閃亮金牌'; color='text-amber-500'; bg='from-amber-200 to-orange-400'; border='border-amber-400'; desc='非常棒！幾乎全對喔！';
        showSparklesEffect();
      } else if (accuracy >= 0.6) {
        emoji='🥈'; title='榮耀銀牌'; color='text-slate-400'; bg='from-slate-200 to-slate-400'; border='border-slate-300'; desc='很不錯！繼續保持！';
      } else {
        emoji='🥉'; title='勇氣銅牌'; color='text-orange-700'; bg='from-orange-200 to-orange-400'; border='border-orange-300'; desc='完成挑戰！下次會更好喔！';
      }

      document.getElementById('res-total-q').innerText = totalQuestions;
      document.getElementById('res-emoji').innerText = emoji;
      document.getElementById('res-title').innerText = title;
      document.getElementById('res-title').className = `text-3xl sm:text-4xl lg:text-5xl font-black mb-1 sm:mb-2 drop-shadow-sm ${color}`;
      document.getElementById('res-desc').innerText = desc;
      document.getElementById('result-card').className = `max-w-lg w-full bg-white rounded-[2rem] lg:rounded-[2.5rem] shadow-xl lg:shadow-2xl p-6 sm:p-8 lg:p-10 border-4 sm:border-8 text-center animate-zoom-in relative overflow-hidden ${border}`;
      document.getElementById('result-bg').className = `absolute inset-0 opacity-10 pointer-events-none bg-gradient-to-br ${bg}`;
      document.getElementById('res-score').innerText = score;
      document.getElementById('res-total-q2').innerText = totalQuestions;

      showConfettiEffect();

      setTimeout(() => {
        if (accuracy === 1) speak("太神啦！你全部都答對了，這是屬於你的閃耀大金盃！");
        else if (accuracy >= 0.8) speak("非常棒喔！你獲得了金牌！");
        else if (accuracy >= 0.6) speak("很不錯喔！你獲得了銀牌，繼續加油！");
        else speak("完成挑戰了！你獲得了銅牌，下次一定會更好！");
      }, 500);
    }

    // --- 匯出 Word ---
    function exportToWord() {
      let listToExport = questions;
      if (questions.length === 0) listToExport = generateQuestionsList(totalQuestions);

      let htmlContent = `
        <html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
        <head>
          <meta charset='utf-8'>
          <title>初級加法樂園學習單</title>
          <style>

            .info-row { display: flex; justify-content: space-between; font-size: 18px; margin-bottom: 20px; border-bottom: 2px dashed #ccc; padding-bottom: 10px; }
            .question-block { margin-bottom: 40px; page-break-inside: avoid; border: 2px solid #e0f2fe; padding: 15px; border-radius: 10px; background-color: #f8fafc;}
            .q-title { font-size: 24px; font-weight: bold; margin-bottom: 10px; color: #334155; }
            .frames-container { text-align: center; }
            .frame-wrapper { display: inline-block; margin: 0 15px; vertical-align: top; }
            .frame-label { text-align: center; font-size: 18px; margin-bottom: 5px; color: #64748b; }
            table { border-collapse: collapse; margin: 0 auto; background: white;}
            td { border: 2px solid #cbd5e1; width: 40px; height: 40px; text-align: center; font-size: 24px; }
            .operator { display: inline-block; font-size: 40px; margin: 20px 10px; vertical-align: top; line-height: 90px; color: #94a3b8; }
          </style>
        </head>
        <body>
          <h1>🍎 初級加法樂園（18以內加法）學習單 🍎</h1>
          <div class="info-row">
            <span>年級：____年____班</span>
            <span>姓名：_________________</span>
            <span>得分：________</span>
          </div>
      `;

      listToExport.forEach((q, idx) => {
        if (difficulty === 'hard') {
          htmlContent += `
            <div class="question-block" style="border: none; border-bottom: 1px dashed #e2e8f0; padding-bottom: 30px;">
              <div class="q-title" style="font-size: 28px; margin-left: 20px;">第 ${idx + 1} 題： &nbsp;&nbsp;&nbsp; ${q.n1} + ${q.n2} = _______</div>
            </div>
          `;
        } else {
          htmlContent += `
            <div class="question-block">
              <div class="q-title">第 ${idx + 1} 題： ${q.n1} + ${q.n2} = _______</div>
              <div class="frames-container">
                <div class="frame-wrapper">
                  <div class="frame-label">有 ${q.n1} 個</div>
                  <table>
                    <tr>${[0,1,2,3,4].map(i => `<td>${i < q.n1 ? '🍎' : ''}</td>`).join('')}</tr>
                    <tr>${[0,1,2,3,4].map(i => `<td>${i + 5 < q.n1 ? '🍎' : ''}</td>`).join('')}</tr>
                  </table>
                </div>
                <div class="operator">+</div>
                <div class="frame-wrapper">
                  <div class="frame-label">加上 ${q.n2} 個</div>
                  <table>
                    <tr>${[0,1,2,3,4].map(i => `<td>${i < q.n2 ? '🍏' : ''}</td>`).join('')}</tr>
                    <tr>${[0,1,2,3,4].map(i => `<td>${i + 5 < q.n2 ? '🍏' : ''}</td>`).join('')}</tr>
                  </table>
                </div>
              </div>
            </div>
          `;
        }
      });

      htmlContent += `</body></html>`;
      const blob = new Blob(['\ufeff', htmlContent], { type: 'application/msword' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = `初級加法樂園_${difficulty === 'hard' ? '心算版' : '圖示版'}_${totalQuestions}題.doc`;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(url);
    }

    // 啟動程式
    window.onload = init;
  </script>
</body>
</html>
