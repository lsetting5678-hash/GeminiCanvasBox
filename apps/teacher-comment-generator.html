<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>班級評語產生器</title>
    <!-- Gemini 元數據 -->
    <meta name="category" content="行政工具">
    <meta name="description" content="幫助國小老師快速生成學生期末評語與建議的行政小幫手。">
    <meta name="icon" content="📝">
    <meta name="tags" content="行政,評語,老師幫手,自動化">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600&family=Noto+Sans+TC:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Fredoka', 'Noto Sans TC', sans-serif;
            background: #fffbe6;
            color: #4a4a4a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            width: 100%;
            background: white;
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(245,223,77,0.2);
            border: 4px solid #ffe5b4;
        }
        h1 {
            color: #b37400;
            text-align: center;
            margin-bottom: 25px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input, select, textarea {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: 2px solid #ffe5b4;
            box-sizing: border-box;
            font-family: inherit;
        }
        .btn {
            background: #ffe5b4;
            color: #5d4037;
            font-weight: bold;
            border: none;
            padding: 12px 20px;
            border-radius: 20px;
            cursor: pointer;
            width: 100%;
            font-size: 1.1rem;
            margin-top: 15px;
        }
        .btn:hover {
            background: #ffd59a;
        }
        .result-box {
            margin-top: 25px;
            background: #fafafa;
            border-radius: 15px;
            padding: 20px;
            border: 2px dashed #ffe5b4;
            min-height: 100px;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 25px;
            color: #7f8c8d;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📝 班級評語產生器</h1>
        <div class="form-group">
            <label>學生姓名/座號：</label>
            <input type="text" id="studentName" placeholder="例如：座號 05">
        </div>
        <div class="form-group">
            <label>學習表現偏向：</label>
            <select id="performance">
                <option value="熱心助人，學習態度積極認真。">主動積極、熱心助人</option>
                <option value="上課專心，作業書寫工整有禮貌。">專心有禮、作業工整</option>
                <option value="頭腦靈活，對數學邏輯很有興趣。">數理優秀、頭腦靈活</option>
                <option value="體育課表現優異，團隊合作精神佳。">體能優秀、樂於合作</option>
            </select>
        </div>
        <div class="form-group">
            <label>待改進與期許：</label>
            <select id="future">
                <option value="期許未來能多閱讀課外讀物，增廣見聞。">期許能增廣閱讀</option>
                <option value="若能再細心一點，學習成績必能更上一層樓。">希望學習更細心</option>
                <option value="期望下學期能發揮所長，大展身手。">期許繼續展現所長</option>
            </select>
        </div>
        <button class="btn" onclick="generateComment()">✨ 生成評語</button>

        <div class="result-box">
            <strong>生成的評語：</strong>
            <p id="resultText" style="margin-top:10px; color:#555;">尚未生成...</p>
        </div>
        
        <a href="../index.html" class="back-link">🔙 返回工具箱目錄</a>
    </div>

    <script>
        function generateComment() {
            const name = document.getElementById('studentName').value || '該生';
            const perf = document.getElementById('performance').value;
            const fut = document.getElementById('future').value;
            
            const comment = `${name}在校${perf}${fut}`;
            document.getElementById('resultText').textContent = comment;
        }
    </script>
</body>
</html>
