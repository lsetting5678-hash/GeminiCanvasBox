<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta name="category" content="數學">
    <meta name="description" content="趣味的九九乘法限時速算挑戰，支援計分、計時與Q彈答題介面！">
    <meta name="icon" content="🧮">
    <meta name="tags" content="數學,乘法,小測驗,互動教學">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>九九乘法挑戰賽</title>
    <!-- Gemini 元數據 -->
    
    
    
    
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600&family=Noto+Sans+TC:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Fredoka', 'Noto Sans TC', sans-serif;
            background: #eef1f6;
            color: #4a4a4a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            width: 100%;
            background: white;
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            border: 4px solid #a8dadc;
        }
        h1 {
            color: #1d3557;
            font-size: 2rem;
            margin-bottom: 20px;
        }
        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            font-size: 1.2rem;
            font-weight: bold;
        }
        .question {
            font-size: 4rem;
            margin: 30px 0;
            color: #e63946;
        }
        .options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .option-btn {
            background: #a8dadc;
            color: #1d3557;
            border: none;
            padding: 15px;
            font-size: 1.5rem;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s, background-color 0.2s;
        }
        .option-btn:hover {
            transform: scale(1.05);
            background: #457b9d;
            color: white;
        }
        .back-link {
            display: inline-block;
            margin-top: 30px;
            color: #7f8c8d;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧮 九九乘法挑戰賽</h1>
        <div class="stats">
            <div>得分: <span id="score">0</span></div>
            <div>題目: <span id="qNum">1</span>/5</div>
        </div>
        <div id="question" class="question">2 × 3 = ?</div>
        <div class="options">
            <button class="option-btn" onclick="checkAnswer(this)">4</button>
            <button class="option-btn" onclick="checkAnswer(this)">5</button>
            <button class="option-btn" onclick="checkAnswer(this)">6</button>
            <button class="option-btn" onclick="checkAnswer(this)">8</button>
        </div>
        <a href="../index.html" class="back-link">🔙 返回工具箱目錄</a>
    </div>

    <script>
        let score = 0;
        let qNum = 1;
        let num1, num2, correctAnswer;

        function generateQuestion() {
            num1 = Math.floor(Math.random() * 8) + 2; // 2~9
            num2 = Math.floor(Math.random() * 8) + 2; // 2~9
            correctAnswer = num1 * num2;

            document.getElementById('question').textContent = `${num1} × ${num2} = ?`;
            document.getElementById('score').textContent = score;
            document.getElementById('qNum').textContent = qNum;

            // 隨機生成選項
            let options = new Set();
            options.add(correctAnswer);
            while(options.size < 4) {
                let wrong = (num1 + Math.floor(Math.random()*3 - 1)) * (num2 + Math.floor(Math.random()*3 - 1));
                if (wrong > 0 && wrong !== correctAnswer) {
                    options.add(wrong);
                } else {
                    options.add(correctAnswer + Math.floor(Math.random() * 10) + 1);
                }
            }

            let optionsArray = Array.from(options).sort(() => Math.random() - 0.5);
            const buttons = document.querySelectorAll('.option-btn');
            buttons.forEach((btn, index) => {
                btn.textContent = optionsArray[index];
                btn.style.background = "#a8dadc";
            });
        }

        function checkAnswer(btn) {
            let selected = parseInt(btn.textContent);
            if (selected === correctAnswer) {
                score += 10;
                btn.style.background = "#b5e2b9";
            } else {
                btn.style.background = "#ffb7b2";
            }

            setTimeout(() => {
                if (qNum < 5) {
                    qNum++;
                    generateQuestion();
                } else {
                    alert(`挑戰結束！您的最終得分是：${score}分！`);
                    score = 0;
                    qNum = 1;
                    generateQuestion();
                }
            }, 800);
        }

        generateQuestion();
    </script>
</body>
</html>
